name: 📊 Calculate RS Ratings (India - NIFTY)

on:
  #workflow_run:
    #workflows: ["Build Tickers and Price Data"]
    #types: [completed]
    #branches: [main]
  workflow_dispatch:   # allow manual run


jobs:
  fetch-rs:
    strategy:
      matrix:
        partition: [0, 1, 2, 3]
    runs-on: ubuntu-latest
    name: fetch-rs-${{ matrix.partition }}
    steps:
      - name: Print workflow start time (IST)
        run: |
          echo "Workflow started at $(date -u -d '+5:30 hours' +'%I:%M %p IST on %A, %B %d, %Y')"

      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      - name: 🔍 Verify ticker_price.json
        run: |
          if [ ! -f data/ticker_price.json ]; then
            echo "Error: data/ticker_price.json not found"
            exit 1
          fi

      - name: 🗃️ Cache Python dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: 🔬 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: 📦 Install dependencies
        run: |
          pip install --upgrade pip
          pip install yahooquery pandas numpy tqdm arcticdb pandas_market_calendars

      - name: ▶️ Fetch data for partition ${{ matrix.partition }}
        run: |
          mkdir -p tmp/arctic_db logs
          rm -f logs/failed_tickers.log
          python scripts/calculate_rs.py data/ticker_price.json \
            --log-file logs/failed_tickers.log \
            --partition ${{ matrix.partition }} \
            --total-partitions 4

      - name: 📦 Upload ArcticDB data
        uses: actions/upload-artifact@v4
        with:
          name: arctic-db-${{ matrix.partition }}
          path: tmp/arctic_db/

      - name: 📊 Upload failed tickers log
        uses: actions/upload-artifact@v4
        with:
          name: failed-tickers-${{ matrix.partition }}
          path: logs/failed_tickers.log
          if-no-files-found: ignore

  validate-arctic-data:
    needs:
      - fetch-rs
    runs-on: ubuntu-latest
    steps:
      - name: Print workflow start time (EDT)
        run: |
          echo "Workflow started at $(date -u -d '4 hours ago' +'%I:%M %p EDT on %A, %B %d, %Y')"

      - name: ⬇️ Checkout repo
        uses: actions/checkout@v4

      - name: 🗃️ Restore cached merged ArcticDB # 🆕
        uses: actions/cache@v4
        with:
          path: tmp/arctic_db
          key: arcticdb-merged-${{ github.run_id }}
          restore-keys: arcticdb-merged-

      - name: ⬇️ Download ArcticDB partitions
        uses: actions/download-artifact@v4
        with:
          path: tmp
          pattern: arctic-db-*

      - name: 🧪 Install ArcticDB
        run: |
          pip install arcticdb

      - name: 🪩 Merge ArcticDB partitions into one DB
        run: |
          echo "🔍 Checking for ArcticDB partition folders..."
          if ls tmp/arctic-db-* 1> /dev/null 2>&1; then
             echo "✅ ArcticDB partitions found:"
             find tmp -type d -name "arctic-db-*"
          else
             echo "❌ No ArcticDB partition folders (tmp/arctic-db-*) found"
             exit 1
          fi

          echo "🧹 Cleaning any previous merged DB at tmp/arctic_db..."
          rm -rf tmp/arctic_db
          mkdir -p tmp/arctic_db

          echo "🚀 Running ArcticDB merge script..."
          python3 scripts/merge_arcticdb.py --source-root tmp --dest-path tmp/arctic_db

          echo "📂 Listing merged DB contents:"
          ls -la tmp/arctic_db

          if [ -z "$(ls -A tmp/arctic_db 2>/dev/null)" ]; then
             echo "❌ Merge failed: tmp/arctic_db is empty"
             exit 1
          else
             echo "✅ ArcticDB merge completed successfully"
          fi

      - name: 🔮 Deep Validate ArcticDB
        run: |
          pip install arcticdb pandas numpy
          python <<EOF
          import arcticdb as adb
          import pandas as pd
          import numpy as np
          import time
      
          start = time.time()
      
          def classify_days(n):
              if n < 21: return "INVALID"
              elif n < 63: return "1M_ONLY"
              elif n < 126: return "PARTIAL"
              elif n < 252: return "GOOD"
              else: return "FULL"
      
          try:
              arctic = adb.Arctic("lmdb://tmp/arctic_db")
      
              if not arctic.has_library("prices"):
                  raise ValueError("❌ Library 'prices' not found.")
      
              lib = arctic.get_library("prices")
              symbols = lib.list_symbols()
      
              if not symbols:
                  raise ValueError("❌ No symbols found")
      
              print(f"✅ Found {len(symbols)} symbols")
      
              issues = []
              summary = {"INVALID":0, "1M_ONLY":0, "PARTIAL":0, "GOOD":0, "FULL":0}
      
              for sym in symbols:
                  try:
                      df = lib.read(sym).data
      
                      # --- Column check ---
                      if "datetime" not in df.columns or "close" not in df.columns:
                          issues.append((sym, "Missing columns"))
                          continue
      
                      # --- Sort ---
                      df = df.sort_values("datetime")
      
                      # --- Basic stats ---
                      rows = len(df)
                      nan_close = df["close"].isna().sum()
                      zero_close = (df["close"] <= 0).sum()
                      dupes = df["datetime"].duplicated().sum()
      
                      # --- Gaps ---
                      df["dt"] = pd.to_datetime(df["datetime"], unit="s")
                      gaps = (df["dt"].diff().dt.days > 5).sum()
      
                      # --- Outliers ---
                      returns = df["close"].pct_change()
                      spikes = ((returns > 1.0) | (returns < -0.8)).sum()
      
                      # --- Classification ---
                      category = classify_days(rows)
                      summary[category] += 1
      
                      # --- Collect issues ---
                      if nan_close > 0 or zero_close > 0 or dupes > 0 or spikes > 0:
                          issues.append((
                              sym,
                              f"rows={rows}, NaN={nan_close}, zero={zero_close}, dupes={dupes}, spikes={spikes}, gaps={gaps}, class={category}"
                          ))
      
                  except Exception as e:
                      issues.append((sym, f"READ ERROR: {e}"))
      
              # ================= OUTPUT =================
              print("\n📊 DATA QUALITY SUMMARY")
              for k,v in summary.items():
                  print(f"{k:10}: {v}")
      
              print(f"\n⚠️ Total problematic tickers: {len(issues)}")
      
              # Show top 20 issues
              for i in issues[:20]:
                  print("❌", i)
      
              # Fail pipeline if too many bad tickers
              if len(issues) > len(symbols) * 0.2:
                  raise ValueError("❌ Too many bad tickers (>20%)")
      
              elapsed = time.time() - start
              print(f"\n✅ Validation completed in {elapsed:.2f}s")
      
          except Exception as e:
              print(f"❌ VALIDATION FAILED: {e}")
              # exit(1)
          EOF


      - name: 📦 Upload merged ArcticDB
        uses: actions/upload-artifact@v4
        with:
          name: arctic-db-merged
          path: tmp/arctic_db

      - name: 🫼 Remove lock file
        run: |
          find tmp/arctic_db -name "lock.mdb" -exec rm -f {} \;

      - name: Print workflow end time (EDT)
        run: |
          echo "Workflow ended at $(date -u -d '4 hours ago' +'%I:%M %p EDT on %A, %B %d, %Y')"
  
  calculate-rs:
    needs: validate-arctic-data
    runs-on: ubuntu-latest
    steps:
      - name: Print workflow start time (IST)
        run: |
          echo "Workflow started at $(date -u -d '+5:30 hours' +'%I:%M %p IST on %A, %B %d, %Y')"

      - name: ⬇️ Checkout repo
        uses: actions/checkout@v4

      - name: ⬇️ Download merged ArcticDB
        uses: actions/download-artifact@v4
        with:
          name: arctic-db-merged
          path: tmp/arctic_db

      - name: 📆 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Install dependencies
        run: |
          pip install --upgrade pip
          pip install pandas numpy tqdm arcticdb pandas_market_calendars

      - name: 📃 Run RS calculation (India - NIFTY500)
        run: |
          mkdir -p RS_Logs RS_Data 
          python scripts/calculate_rs_from_db.py \
            --arctic-db-path tmp/arctic_db \
            --reference-ticker ^CRSLDX \
            --output-dir RS_Data \
            --log-file logs/failed_tickers.log \
            --metadata-file data/ticker_price.json \
            --debug

      - name: 🔍 Find Inside Bars (RS >= 80, Price >= 30)
        run: |
          current_date=$(date -u -d "4 hours ago" +"%m%d%Y")
          mkdir -p logs RS_Data
          python scripts/find_inside_bars.py \
            --arctic-db-path tmp/arctic_db \
            --input-csv RS_Data/rs_stocks.csv \
            --output-dir RS_Data \
            --log-file logs/failed_ib_tickers.log \
            --date "$current_date" \
            --rs-threshold 80.0 \
            --min-price 30.0
            
      - name: 📦 Archive RS + Inside Bar Results
        run: |
          mkdir -p archive
          current_date=$(date -u -d "4 hours ago" +"%m%d%Y")
          echo "Archiving results for: ${current_date}"

          # RS files
          for file in rs_stocks rs_industries RSRATING; do
            if [ -f "RS_Data/${file}.csv" ]; then
              cp "RS_Data/${file}.csv" "archive/${file}_${current_date}.csv"
              echo "Archived ${file}_${current_date}.csv"
            else
              echo "❌ RS_Data/${file}.csv not found!"
              exit 1
            fi
          done

          # Inside Bar file
          ib_file="RS_Data/IB_Stocks.csv"
          if [ -f "$ib_file" ]; then
            cp "$ib_file" "archive/IB_Stocks_${current_date}.csv"
            echo "✅ Archived IB_Stocks_${current_date}.csv"
          else
            echo "❌ Warning: IB_Stocks_${current_date}.csv not found"
          fi

          # echo "🧹 Cleaning CSV files older than 90 days in archive..."
          # find archive -type f -name "*.csv" -mtime +90 -print -delete

          echo "📦 Final archived files:"
          ls -l archive | tail -n 10


      - name: 🗓️ Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: rs-results
          path: |
            RS_Data/*.csv
            logs/failed_tickers.log
            archive/*.csv
            logs/debug_rs/*.log
            logs/debug_rs/*.csv

      - name: 📤 Commit and Push RS Results
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}

          # Reliable IST date
          current_date=$(TZ=Asia/Kolkata date +"%m%d%Y")
          echo "Results date (IST): $current_date"

          # Stage everything
          git add archive/*.csv RS_Data/*.csv 2>/dev/null || true
          git add logs/debug_rs/*.csv logs/debug_rs/*.log 2>/dev/null || true
          git add logs/failed_tickers.log 2>/dev/null || true
        

          #commit 
          git commit -m "Add RS results for ${current_date}"
          git push origin main
          
          echo "Successfully pushed RS results for $current_date"

      - name: Trigger 3-split_rs_stocks.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run "3-split_rs_stocks.yml"
          
      - name: Print workflow end time (EDT)
        run: |
          echo "Workflow ended at $(date -u -d '4 hours ago' +'%I:%M %p EDT on %A, %B %d, %Y')"
