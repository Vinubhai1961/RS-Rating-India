name: Build Market Breadth

on:
  workflow_call: 
  workflow_dispatch: # allow manual run

permissions:
  contents: write

jobs:
  build-market-breadth:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pandas numpy

      - name: Build market breadth
        run: |
          python scripts/build_market_breadth.py \
            --input RS_Data/rs_stocks.csv \
            --archive-dir archive \
            --output-dir market_breadth \
            --timezone America/New_York

      - name: Commit and push if market breadth changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add market_breadth/market_breadth_*.csv || true

          if git diff --staged --quiet; then
            echo "No changes to market_breadth files"
          else
            git commit -m "chore: update market breadth [skip ci]"

            echo "🔄 Pulling latest changes before pushing..."
            git pull --rebase origin main || echo "Pull had minor issues"

            echo "🚀 Pushing changes..."
            for i in {1..3}; do
              if git push origin main; then
                echo "✅ Successfully pushed market breadth"
                break
              else
                echo "⚠️ Push failed (attempt $i/3). Retrying..."
                sleep 3
                git pull --rebase origin main || true
              fi
            done
          fi
