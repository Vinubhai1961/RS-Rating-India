name: Filter strong RS stocks near 52 week high

on:
  workflow_call:
  #workflow_run:
    #workflows: ["Generate IPO"]
    #types: [completed]
    #branches: [main]

  #schedule:
    #- cron: "05 11 * * 1-5"   # 7:00 AM EST Mon–Fri

  workflow_dispatch:         # manual run

jobs:
  filter:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # needed for proper git diff / history

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          #cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas

      - name: Run filter script
        run: python scripts/filter_52wh.py


      - name: Commit and push result if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Only add the actual output file
          git add RS_Data/RS80_Price30_within27pct_52wh.csv || true

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update RS>80 + Price>30 + near 52WH list"

            echo "🔄 Pulling latest changes from main..."
            git pull --rebase origin main || echo "Pull had minor issues, continuing..."

            echo "🚀 Pushing changes to main..."
            for i in {1..3}; do
              if git push origin main; then
                echo "✅ Push successful"
                break
              else
                echo "⚠️ Push failed (attempt $i/3). Retrying in 3 seconds..."
                sleep 3
                git pull --rebase origin main || true
              fi
            done
          fi
